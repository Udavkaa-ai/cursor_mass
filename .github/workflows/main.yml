name: Build Android APK

on:
  push:
    branches:
      - claude/yandex-maps-widget-Zod7Y
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android_apk/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Set sdk.dir
        run: echo "sdk.dir=$ANDROID_HOME" > android_apk/local.properties

      - name: Install Gradle
        run: |
          apt-get update -qq
          apt-get install -y gradle

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: android_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: buswidget-apk
          path: android_apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
