name: Build Android APK

on:
  push:
    branches:
      - claude/yandex-maps-widget-Zod7Y
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # Docker-образ с предустановленными Android SDK/NDK/buildozer
      # Самый надёжный способ — не зависит от apt-пакетов Ubuntu
      - name: Build with Buildozer (Docker)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: android_widget
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buswidget-debug-apk
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
