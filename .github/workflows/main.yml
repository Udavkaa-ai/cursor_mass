name: Build Android APK

on:
  push:
    branches:
      - claude/yandex-maps-widget-Zod7Y
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android_apk/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Set sdk.dir
        run: echo "sdk.dir=$ANDROID_HOME" > android_apk/local.properties

      - name: Create Gradle wrapper
        run: |
          cd android_apk
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.7 --distribution-type=bin 2>&1 || {
              # Fallback: download wrapper from gradle repository
              mkdir -p gradle/wrapper
              GRADLE_VERSION="8.7"
              BASE_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}"
              curl -s -o gradle/wrapper/gradle-wrapper.jar "${BASE_URL}/gradle/wrapper/gradle-wrapper.jar"
              curl -s -o gradle/wrapper/gradle-wrapper.properties "${BASE_URL}/gradle/wrapper/gradle-wrapper.properties"
              curl -s -o gradlew "${BASE_URL}/gradlew"
              chmod +x gradlew
            }
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buswidget-apk
          path: android_apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
