name: Build Android APK

on:
  push:
    branches:
      - claude/yandex-maps-widget-Zod7Y
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android_apk/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Set sdk.dir
        run: echo "sdk.dir=$ANDROID_HOME" > android_apk/local.properties

      - name: Make gradlew executable
        run: chmod +x android_apk/gradlew

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p android_apk/gradle/wrapper
          # Download gradle wrapper jar using Java built-in tools as curl might have SSL issues
          cd android_apk
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            ./gradlew --version || true
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buswidget-apk
          path: android_apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show build output if failed
        if: failure()
        run: |
          echo "=== Build Error Output ===" && \
          find android_apk/app/build -name "*.log" -type f -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || \
          echo "No build logs found"
