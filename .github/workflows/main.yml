name: Build Android APK

on:
  push:
    branches:
      - claude/yandex-maps-widget-Zod7Y
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Cache .buildozer (local)
        uses: actions/cache@v4
        with:
          path: android_widget/.buildozer
          key: buildozer-local-${{ hashFiles('android_widget/buildozer.spec') }}
          restore-keys: buildozer-local-

      - name: Cache ~/.buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-ubuntu22-v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer + p4a + cython
        run: pip install --upgrade buildozer python-for-android cython

      # Система уже имеет Android SDK с принятыми лицензиями.
      # Используем её sdkmanager с --sdk_root чтобы заранее установить
      # build-tools/platforms в папку buildozer — aidl будет найден.
      - name: Pre-populate buildozer Android SDK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK"
          # Принимаем лицензии и копируем их
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
          cp -r "$ANDROID_HOME/licenses" "$SDK/"
          # Копируем cmdline-tools (sdkmanager) в SDK buildozer
          mkdir -p "$SDK/cmdline-tools"
          cp -r "$ANDROID_HOME/cmdline-tools/latest" "$SDK/cmdline-tools/"
          # Устанавливаем build-tools и платформу через скопированный sdkmanager
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$SDK" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools"
          # Старая p4a ищет sdkmanager по пути tools/bin/ — создаём симлинк
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"

      - name: Build APK
        working-directory: android_widget
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: buswidget-debug-apk
          path: android_widget/bin/*.apk
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_widget/build.log
          retention-days: 7
