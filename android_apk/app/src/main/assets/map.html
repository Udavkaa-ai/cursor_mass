<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=YOUR_YANDEX_API_KEY"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 14px;
            z-index: 10;
        }
        .stop-name {
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }
        .arrival-info {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel" id="info" style="display:none;">
        <div class="stop-name" id="stopName"></div>
        <div class="arrival-info" id="arrivalInfo"></div>
    </div>
    <script src="map.js"></script>
</body>
</html>
